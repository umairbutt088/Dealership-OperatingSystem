services:
  - type: web
    name: dealershipos
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn dealershipos.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEALERSHIP_DATA_DIR
        value: /tmp/dealershipos-data
      - key: DEALERSHIP_DATABASE_URL
        value: sqlite:////tmp/dealershipos-data/dealershipos.db
      - key: DEALERSHIP_BOOTSTRAP_FROM_ASSET
        value: "false"
